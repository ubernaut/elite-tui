<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1800" viewBox="0 0 3200 1800" role="img" aria-labelledby="title desc">
  <title id="title">Elite TUI high resolution cockpit help overlay</title>
  <desc id="desc">A high character-count neon terminal cockpit view with help overlay, ASCII flight view, scanner, and dashboard.</desc>
